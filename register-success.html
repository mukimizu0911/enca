<!DOCTYPE html>
<html lang="ja">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>登録完了 | ぬくみずとのエンカ表</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div id="toast" class="toast"></div>

    <div id="background1" class="background"></div>
    <div id="background2" class="background"></div>

    <div class="container">

        <h1 class="title">
            🎉 登録完了！
        </h1>

        <p class="subtitle">
            ユーザー登録が完了しました！
        </p>

        <h2
            id="username"
            style="
                color:#003366;
                margin-bottom:20px;
            ">
        </h2>

        <p
            style="
                color:#666;
                margin-bottom:10px;
            ">
            あなたのユーザーID
        </p>

        <h2
            id="userId"
            style="
                font-size:3rem;
                color:#00a8ff;
                margin:20px 0 30px;
                letter-spacing:4px;
            ">
        </h2>

        <p
            style="
                margin-bottom:35px;
                line-height:1.8;
                color:#d63031;
                font-weight:bold;
            ">

            ⚠️ このIDはログイン時に必要です。<br>

            忘れないようにスクリーンショットまたはメモをしてください。

        </p>

        <button
            class="btn"
            id="copyButton">

            📋 IDをコピー

        </button>

        <br><br>

        <a
            href="login.html"
            class="btn">

            🔑 ログイン画面へ

        </a>

    </div>

    <script type="module" src="js/register-success.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/background.js"></script>

</body>

</html>
